name: Build HTML from Writings

on:
  push:
    branches: [master]
    paths:
      - 'writings/**/*.md'
      - 'build.py'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run build script
        run: python build.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html writings.html
          git diff --cached --quiet || git commit -m "Auto-update HTML from writings [skip ci]"
          git push
